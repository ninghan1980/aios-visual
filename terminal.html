<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三元 AIOS · 交互终端</title>
<script src="aios-data.js"></script>
<style>
:root {
  --bg-primary: #0a0c0f;
  --bg-secondary: #111418;
  --bg-card: #161b22;
  --border: #1e2a3a;
  --border-focus: #58b4ff;
  --text-primary: #e8eaed;
  --text-secondary: #8b949e;
  --accent-cyan: #58b4ff;
  --accent-green: #3fb950;
  --accent-red: #f85149;
  --accent-yellow: #d29922;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'JetBrains Mono', 'Noto Sans SC', monospace;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Top Bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-secondary); flex-shrink: 0;
}
.top-left { display: flex; align-items: center; gap: 16px; }
.top-title { font-size: 16px; font-weight: 600; }
.top-title span { color: var(--accent-cyan); }
.top-actions { display: flex; align-items: center; gap: 8px; }
.pills { display: flex; gap: 8px; }
.pill {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px;
  background: rgba(255,255,255,0.05); font-size: 11px;
}
.pill-dot { width: 6px; height: 6px; border-radius: 50%; }
.green { background: var(--accent-green); }
.red { background: var(--accent-red); }
.yellow { background: var(--accent-yellow); }
.health-badge {
  padding: 4px 12px; border-radius: 12px;
  background: rgba(88,180,255,0.1); border: 1px solid rgba(88,180,255,0.3);
  font-size: 12px; font-weight: 600;
}
.btn-icon {
  padding: 4px 10px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-secondary); font-size: 12px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

/* Tab Bar */
.tab-bar {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg-secondary); flex-shrink: 0;
}
.tab {
  padding: 8px 20px; cursor: pointer; font-size: 13px;
  color: var(--text-secondary); border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
.tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

/* Content */
.content { flex: 1; display: flex; overflow: hidden; }
.panel { display: none; flex: 1; overflow: hidden; }
.panel.active { display: flex; }

/* Chat Panel — Coze API */
.chat-panel { flex-direction: column; background: var(--bg-primary); }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg { display: flex; gap: 10px; max-width: 85%; }
.chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg .avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
}
.chat-msg.user .avatar { background: var(--accent-cyan); color: #000; }
.chat-msg.bot .avatar { background: rgba(88,180,255,0.15); border: 1px solid var(--border); color: var(--accent-cyan); }
.chat-msg .bubble {
  padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}
.chat-msg.user .bubble { background: rgba(88,180,255,0.15); border: 1px solid rgba(88,180,255,0.3); }
.chat-msg.bot .bubble { background: var(--bg-card); border: 1px solid var(--border); }
.chat-msg.bot .bubble code {
  background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 3px;
  font-size: 12px; font-family: 'JetBrains Mono', monospace;
}
.chat-msg.bot .bubble pre {
  background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto;
  margin: 8px 0; border: 1px solid var(--border);
}
.chat-msg.bot .bubble pre code { background: none; padding: 0; }
.chat-input-row {
  display: flex; padding: 12px 16px; border-top: 1px solid var(--border);
  background: var(--bg-secondary); align-items: center; gap: 8px;
}
.chat-input {
  flex: 1; padding: 10px 14px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text-primary); font-family: inherit; font-size: 13px;
  outline: none; resize: none;
}
.chat-input:focus { border-color: var(--accent-cyan); }
.chat-send {
  padding: 10px 20px; background: var(--accent-cyan);
  border: none; border-radius: 8px; color: #000; font-weight: 600;
  cursor: pointer; font-family: inherit; font-size: 13px;
  transition: opacity 0.15s; flex-shrink: 0;
}
.chat-send:hover { opacity: 0.85; }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* Token Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; max-width: 480px; width: 90%;
}
.modal h2 { font-size: 16px; margin-bottom: 6px; }
.modal p { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
.modal input {
  width: 100%; padding: 10px 14px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text-primary); font-family: inherit; font-size: 13px;
  outline: none; margin-bottom: 12px;
}
.modal input:focus { border-color: var(--accent-cyan); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 20px; border-radius: 6px; font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer; border: none;
}
.modal-btn.primary { background: var(--accent-cyan); color: #000; }
.modal-btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
.token-status { font-size: 12px; margin-top: 8px; }
.token-status.ok { color: var(--accent-green); }
.token-status.err { color: var(--accent-red); }

/* Command Panel */
.cmd-panel { flex-direction: column; }
.cmd-sidebar {
  width: 200px; border-right: 1px solid var(--border);
  padding: 16px; overflow-y: auto; flex-shrink: 0;
  background: var(--bg-secondary);
}
.cmd-section { margin-bottom: 20px; }
.cmd-section-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-secondary); margin-bottom: 8px;
}
.cmd-btn {
  display: block; width: 100%; padding: 6px 10px; margin-bottom: 4px;
  background: transparent; border: 1px solid var(--border); border-radius: 4px;
  color: var(--accent-cyan); font-family: inherit; font-size: 12px;
  cursor: pointer; text-align: left; transition: all 0.15s;
}
.cmd-btn:hover { background: rgba(88,180,255,0.1); border-color: var(--accent-cyan); }
.cmd-main { flex: 1; display: flex; flex-direction: column; }
.cmd-messages {
  flex: 1; overflow-y: auto; padding: 16px; display: flex;
  flex-direction: column; gap: 10px;
}
.msg { max-width: 80%; }
.msg.user { align-self: flex-end; }
.msg.user .msg-bubble { background: rgba(88,180,255,0.15); border: 1px solid rgba(88,180,255,0.3); }
.msg.bot .msg-bubble { background: var(--bg-card); border: 1px solid var(--border); }
.msg-bubble {
  padding: 8px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6;
}
.cmd-input-row {
  display: flex; padding: 12px; border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}
.cmd-input {
  flex: 1; padding: 8px 12px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-primary); font-family: inherit; font-size: 13px;
  outline: none;
}
.cmd-input:focus { border-color: var(--accent-cyan); }
.cmd-send {
  margin-left: 8px; padding: 8px 16px; background: var(--accent-cyan);
  border: none; border-radius: 6px; color: #000; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

/* Status Panel */
.status-panel { padding: 20px; overflow-y: auto; }
.status-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.status-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px;
}
.status-card h3 { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
.status-row {
  display: flex; justify-content: space-between; padding: 4px 0;
  font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.status-row:last-child { border-bottom: none; }
.status-val { font-weight: 600; }
.ok { color: var(--accent-green); }
.warn { color: var(--accent-yellow); }
.err { color: var(--accent-red); }
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-left">
    <div class="top-title"><span>三元</span> AIOS · 交互终端 v4</div>
    <div class="pills" id="topPills"></div>
  </div>
  <div class="top-actions">
    <button class="btn-icon" id="tokenBtn" onclick="showTokenModal()">🔑 Token</button>
    <div class="health-badge" id="healthBadge">健康分: --</div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="chat">💬 对话</div>
  <div class="tab" data-tab="cmd">⌨️ 命令</div>
  <div class="tab" data-tab="status">📊 状态</div>
</div>

<div class="content">
  <!-- 对话Tab — Coze API -->
  <div class="panel chat-panel active" id="panelChat">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg bot">
        <div class="avatar">三</div>
        <div class="bubble">🟢 三元 AIOS 交互终端 v4\n\n直接输入文字与三元对话。\n点击右上角 🔑 Token 配置访问凭证。</div>
      </div>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="输入消息..." oninput="autoResize(this)"></textarea>
      <button class="chat-send" id="chatSend" onclick="sendChat()">发送</button>
    </div>
  </div>

  <!-- 命令Tab -->
  <div class="panel cmd-panel" id="panelCmd">
    <div class="cmd-sidebar">
      <div class="cmd-section">
        <div class="cmd-section-title">系统</div>
        <button class="cmd-btn">/status</button>
        <button class="cmd-btn">/health</button>
        <button class="cmd-btn">/token</button>
      </div>
      <div class="cmd-section">
        <div class="cmd-section-title">感知</div>
        <button class="cmd-btn">/aether</button>
        <button class="cmd-btn">/hot</button>
      </div>
      <div class="cmd-section">
        <div class="cmd-section-title">渠道</div>
        <button class="cmd-btn">/channels</button>
      </div>
    </div>
    <div class="cmd-main">
      <div class="cmd-messages" id="cmdMessages"></div>
      <div class="cmd-input-row">
        <input class="cmd-input" id="cmdInput" placeholder="输入命令或消息..." />
        <button class="cmd-send" id="cmdSend">发送</button>
      </div>
    </div>
  </div>

  <!-- 状态Tab -->
  <div class="panel status-panel" id="panelStatus">
    <div class="status-grid" id="statusGrid"></div>
  </div>
</div>

<!-- Token 配置弹窗 -->
<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h2>🔑 配置访问凭证</h2>
    <p>输入你的 Coze PAT (Personal Access Token) 来授权对话。<br>可在 扣子平台 → 设置 → API Token 生成。</p>
    <input type="password" id="tokenInput" placeholder="输入 pat_xxx..." />
    <div class="token-status" id="tokenStatus"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="hideTokenModal()">取消</button>
      <button class="modal-btn primary" onclick="saveToken()">保存</button>
    </div>
  </div>
</div>

<script>
// ========== Coze API Config ==========
const BOT_ID = '7599196382645813282';
const COZE_API = 'https://api.coze.cn';

function getToken() { return localStorage.getItem('coze_pat') || ''; }

function showTokenModal() {
  document.getElementById('tokenInput').value = getToken();
  document.getElementById('tokenStatus').textContent = '';
  document.getElementById('tokenModal').classList.add('show');
}
function hideTokenModal() { document.getElementById('tokenModal').classList.remove('show'); }
function saveToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { document.getElementById('tokenStatus').textContent = '❌ 请输入 Token'; document.getElementById('tokenStatus').className = 'token-status err'; return; }
  localStorage.setItem('coze_pat', token);
  document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
  document.getElementById('tokenStatus').className = 'token-status ok';
  setTimeout(hideTokenModal, 800);
  updateTokenIndicator();
}
function updateTokenIndicator() {
  const t = getToken();
  document.getElementById('tokenBtn').textContent = t ? '🔑 ✓' : '🔑 Token';
}

// ========== Chat - Coze API ==========
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');
let conversationId = localStorage.getItem('coze_conversation_id') || '';

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function addChatMsg(role, content) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const avatar = role === 'user' ? '我' : '三';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${content.replace(/\n/g, '<br>').replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')}</div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addLoadingMsg() {
  const div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.id = 'chatLoading';
  div.innerHTML = '<div class="avatar">三</div><div class="bubble"><span class="loading-dots">思考中</span></div>';
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function removeLoadingMsg() {
  const el = document.getElementById('chatLoading');
  if (el) el.remove();
}

function setLoadingText(text) {
  const el = document.getElementById('chatLoading');
  if (el) {
    const bubble = el.querySelector('.bubble');
    if (bubble) bubble.innerHTML = text;
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
}

async function pollChatStatus(chatId, convId, maxWait) {
  const token = getToken();
  const start = Date.now();
  while (Date.now() - start < maxWait * 1000) {
    const resp = await fetch(`${COZE_API}/v3/chat/retrieve?chat_id=${chatId}&conversation_id=${convId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await resp.json();
    if (data.code !== 0) throw new Error(data.msg || 'Poll failed');
    const status = data.data.status;
    if (status === 'completed' || status === 'failed') return status;
    setLoadingText(`⏳ ${status === 'in_progress' ? '三元思考中...' : '等待响应...'}`);
    await new Promise(r => setTimeout(r, 1500));
  }
  throw new Error('超时');
}

async function sendChat() {
  const text = chatInput.value.trim();
  if (!text || chatSend.disabled) return;
  
  const token = getToken();
  if (!token) {
    showTokenModal();
    return;
  }

  chatInput.value = '';
  chatInput.style.height = 'auto';
  chatSend.disabled = true;
  chatSend.textContent = '...';

  addChatMsg('user', text);
  addLoadingMsg();

  try {
    // Step 1: Create chat
    const body = {
      bot_id: BOT_ID,
      user_id: 'terminal_user',
      additional_messages: [{ role: 'user', content: text, content_type: 'text' }],
      stream: false,
      auto_check: true,
    };
    if (conversationId) body.conversation_id = conversationId;

    const resp = await fetch(`${COZE_API}/v3/chat`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.code !== 0) throw new Error(data.msg || 'API Error');

    const chatId = data.data.id;
    const convId = data.data.conversation_id;
    if (!conversationId) {
      conversationId = convId;
      localStorage.setItem('coze_conversation_id', convId);
    }

    // Step 2: Poll until completed
    if (data.data.status === 'in_progress') {
      const status = await pollChatStatus(chatId, convId, 60);
      if (status === 'failed') throw new Error('三元回复失败');
    }

    setLoadingText('📥 获取回复...');

    // Step 3: Get messages
    const msgResp = await fetch(`${COZE_API}/v3/chat/message/list?chat_id=${chatId}&conversation_id=${convId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const msgData = await msgResp.json();
    if (msgData.code !== 0) throw new Error(msgData.msg || 'Msg list error');

    removeLoadingMsg();

    const msgs = msgData.data || [];
    const botMsg = msgs.filter(m => m.role === 'assistant').pop();
    if (botMsg) {
      addChatMsg('bot', botMsg.content);
    } else {
      addChatMsg('bot', '（三元未返回内容）');
    }

  } catch(e) {
    removeLoadingMsg();
    addChatMsg('bot', `❌ 错误: ${e.message}`);
    if (e.message.includes('401') || e.message.includes('unauthorized') || e.message.includes('鉴权')) {
      localStorage.removeItem('coze_pat');
      updateTokenIndicator();
    }
  }

  chatSend.disabled = false;
  chatSend.textContent = '发送';
}

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// ========== Tab Switching ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  });
});

// ========== Live Data ==========
let liveData = {};
async function loadLiveData() {
  liveData = await AIOSData.all();
  updateTopBar();
  updateStatusPanel();
}

function updateTopBar() {
  const sys = liveData.sys;
  if (!sys) return;
  const mods = sys.modules || {};
  const pillsHtml = [
    { name: 'Ω_loop', s: mods.omega_loop?.status },
    { name: 'AIOS', s: mods.aios?.status },
    { name: 'Aether', s: mods.aether?.status },
    { name: '星光', s: mods.starlight?.status },
  ].map(p => {
    const c = p.s === 'online' ? 'green' : p.s === 'offline' ? 'red' : 'yellow';
    return `<div class="pill"><span class="pill-dot ${c}"></span>${p.name}</div>`;
  }).join('');
  document.getElementById('topPills').innerHTML = pillsHtml;
  const badge = document.getElementById('healthBadge');
  badge.textContent = '健康分: ' + (sys.health_score || '--');
  badge.style.color = sys.health_score > 70 ? 'var(--accent-green)' : 'var(--accent-red)';
}

function updateStatusPanel() {
  const sys = liveData.sys;
  const aether = liveData.aether;
  const token = liveData.token;
  if (!sys) return;
  const mods = sys.modules || {};
  const channels = sys.channels || {};
  let html = '';
  html += '<div class="status-card"><h3>🔧 核心模块</h3>';
  Object.entries(mods).forEach(([k, v]) => {
    const s = v.status === 'online' ? 'ok' : v.status === 'offline' ? 'err' : 'warn';
    html += `<div class="status-row"><span>${k}</span><span class="status-val ${s}">${v.status}${v.reason ? ' · ' + v.reason : ''}</span></div>`;
  });
  html += '</div>';
  html += '<div class="status-card"><h3>📢 发布渠道</h3>';
  Object.entries(channels).forEach(([k, v]) => {
    const s = v.status === 'online' ? 'ok' : v.status === 'banned' ? 'err' : 'warn';
    html += `<div class="status-row"><span>${k}</span><span class="status-val ${s}">${v.status}${v.until ? ' → ' + v.until : ''}</span></div>`;
  });
  html += '</div>';
  if (aether) {
    html += `<div class="status-card"><h3>📡 Aether感知层</h3>
      <div class="status-row"><span>轮次</span><span class="status-val ok">C${aether.cycle || '?'}</span></div>
      <div class="status-row"><span>在线率</span><span class="status-val ok">${Math.round((aether.online_rate || 0) * 100)}%</span></div>
      <div class="status-row"><span>信号总数</span><span class="status-val ok">${aether.total_signals || 0}</span></div>
      <div class="status-row"><span>数据源</span><span class="status-val ok">${aether.sources_total || 0}</span></div>
    </div>`;
  }
  if (token) {
    const d = token.daily || {};
    html += `<div class="status-card"><h3>💰 Token消耗</h3>
      <div class="status-row"><span>今日Token</span><span class="status-val">${AIOSData.fmtNum(d.tokens_used || 0)}</span></div>
      <div class="status-row"><span>今日成本</span><span class="status-val">¥${d.cost_cny || 0}</span></div>
      <div class="status-row"><span>今日任务</span><span class="status-val">${d.tasks_count || 0}</span></div>
    </div>`;
  }
  document.getElementById('statusGrid').innerHTML = html;
}

// ========== Command Panel ==========
const cmdMessages = document.getElementById('cmdMessages');
const cmdInput = document.getElementById('cmdInput');

const commands = {
  '/status': () => {
    const sys = liveData.sys;
    if (!sys) return '⏳ 数据加载中...';
    const m = sys.modules || {}; const ch = sys.channels || {};
    return '📊 <b>系统状态</b>\n' + [
      ['Ω_loop', m.omega_loop?.status === 'online' ? '✅ 在线' : '❌ 离线'],
      ['AIOS', m.aios?.status === 'online' ? '✅ 在线' : '❌ 离线'],
      ['Aether', `✅ C${m.aether?.cycle || '?'} · ${Math.round((liveData.aether?.online_rate || 0) * 100)}%`],
      ['星光', m.starlight?.status === 'online' ? '✅ 在线' : '❌ 离线' + (m.starlight?.reason ? ' · ' + m.starlight.reason : '')],
      ['小红书', ch.xiaohongshu?.status === 'online' ? '✅' : '⚠ ' + ch.xiaohongshu?.status],
      ['微博', ch.weibo?.status === 'online' ? '✅' : '🔒 ' + (ch.weibo?.until || '禁言中')],
    ].map(r => `${r[0]}：${r[1]}`).join('\n');
  },
  '/health': () => {
    const score = liveData.sys?.health_score || 0;
    return `❤️ <b>健康评分</b>：${score}/100\n${'█'.repeat(Math.round(score / 5))}${'░'.repeat(20 - Math.round(score / 5))}`;
  },
  '/token': () => {
    const d = liveData.token?.daily || {};
    return `💰 <b>Token消耗</b>\n今日：${AIOSData.fmtNum(d.tokens_used || 0)}\n成本：¥${d.cost_cny || 0}\n任务：${d.tasks_count || 0}`;
  },
  '/aether': () => {
    const a = liveData.aether;
    if (!a) return '⏳ 数据加载中...';
    return `📡 <b>Aether</b>\nC${a.cycle} · 在线${Math.round((a.online_rate || 0) * 100)}%\n信号：${a.total_signals} · 源：${a.sources_total}`;
  },
  '/hot': () => {
    const h = liveData.aether?.weibo_hot;
    if (!h) return '⏳ 暂无热搜数据';
    return '🔥 <b>微博热搜</b>\n' + h.slice(0, 5).map(w => `#${w.rank+1} ${w.title}`).join('\n');
  },
  '/channels': () => {
    const ch = liveData.sys?.channels || {};
    return '📢 <b>发布渠道</b>\n' + Object.entries(ch).map(([k, v]) => `${k}：${v.status}${v.until ? ' → ' + v.until : ''}`).join('\n');
  },
};

function addCmdMsg(text, isUser = false) {
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;
  div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
  cmdMessages.appendChild(div);
  cmdMessages.scrollTop = cmdMessages.scrollHeight;
}

function handleCmd() {
  const text = cmdInput.value.trim();
  if (!text) return;
  addCmdMsg(text, true);
  cmdInput.value = '';
  const cmd = text.startsWith('/') ? text.split(' ')[0] : null;
  setTimeout(() => addCmdMsg(cmd && commands[cmd] ? commands[cmd]() : '收到。输入 /status /token /aether /hot /channels /health 查看实时数据。'), 200);
}

cmdInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleCmd(); });
document.getElementById('cmdSend').addEventListener('click', handleCmd);
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.addEventListener('click', () => { cmdInput.value = btn.textContent.trim(); handleCmd(); });
});

addCmdMsg('🟢 三元 AIOS 交互终端 v4\n<b>对话Tab</b>：通过 Coze API 直接与三元对话\n<b>命令Tab</b>：快捷查看系统状态\n<b>状态Tab</b>：完整状态面板\n\n⚠ 首次使用对话需先配置 🔑 Token');

// ========== Init ==========
updateTokenIndicator();
autoRefresh(loadLiveData, 60000);
loadLiveData();
</script>
</body>
</html>
